# Railway build/deploy config.
# The web service uses the Dockerfile. Add a SEPARATE Railway "cron" service
# (same repo) that hits /run once a day — see README for the exact steps.

[build]
builder = "dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
